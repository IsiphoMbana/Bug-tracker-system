<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Issue Tracker Test</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }

        form {
            display: grid;
            gap: 8px;
            max-width: 400px;
            margin-bottom: 20px;
        }

        input, textarea, select {
            padding: 8px;
        }

        button {
            padding: 10px;
            background: black;
            color: white;
            border: none;
            cursor: pointer;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 8px;
        }
    </style>
</head>
<body>

<h2>Issue Tracker Test</h2>

<!-- FORM -->
<form id="issueForm">
    <input id="summary" placeholder="Summary" required>
    <textarea id="description" placeholder="Description" required></textarea>
    <input id="reportedBy" placeholder="Reported By" required>
    <input id="dateReported" type="date" required>

    <input id="project" placeholder="Project" required>
    <input id="assignedTo" placeholder="Assigned To (ID)" required>

    <select id="priority">
        <option value="low">Low</option>
        <option value="medium">Medium</option>
        <option value="high">High</option>
    </select>

    <input id="targetDate" type="date" required>
    <input id="actualDate" type="date">
    <input id="resolution" placeholder="Resolution">

    <button type="submit">Create Issue</button>
</form>

<button onclick="showIssues()">Show Issues</button>

<!-- OUTPUT -->
<table>
    <thead>
        <tr>
            <th>Summary</th>
            <th>Project</th>
            <th>Priority</th>
            <th>Status</th>
        </tr>
    </thead>
    <tbody id="output"></tbody>
</table>

<script src="appdata.js"></script>

<script>
function showIssues() 
{
    console.log(getIssues()); // check if data exists

    let issues = getIssues();
    let output = document.getElementById("output");

    output.innerHTML = "";

    if (issues.length === 0) {
        output.innerHTML = "<tr><td colspan='4'>No issues found</td></tr>";
        return;
    }

    for (let issue of issues) {
        output.innerHTML += `
            <tr>
                <td>${issue.summary}</td>
                <td>${issue.project}</td>
                <td>${issue.priority}</td>
                <td>${issue.status || "unknown"}</td>
            </tr>
        `;
    }
}
</script>

</body>
</html>
