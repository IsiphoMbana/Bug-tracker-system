<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bug Tracker Dashboard</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container1">
      <h2 class="header">Bug Tracker Dashboard</h2>

      <!-- Open Issues  -->
      <div class="statusBlock">
        <h3 class="blockTitle">Open Issues</h3>
        <div id="openIssues" class="issueRow"></div>
      </div>

      <!-- In-Progress Issues  -->
      <div class="statusBlock">
        <h3 class="blockTitle">In-Progress Issues</h3>
        <div id="inProgressIssues" class="issueRow"></div>
      </div>

      <!-- Resolved Issues  -->
      <div class="statusBlock">
        <h3 class="blockTitle">Resolved Issues</h3>
        <div id="resolvedIssues" class="issueRow"></div>
      </div>

      <!-- Overdue Issues  -->
      <div class="statusBlock">
        <h3 class="blockTitle">Overdue Issues</h3>
        <div id="overdueIssues" class="issueRow"></div>
      </div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
